# Local parity. One Postgres (Supabase stand-in, same engine) and one Redis.
# Redis gains consumers in Phase 2 (Medusa modules + the worker). The optional
# `proxy` profile adds the Caddy reverse proxy for brand/domain routing.
services:
  postgres:
    image: postgres:16-alpine
    container_name: better-life-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: better_life
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d better_life"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: better-life-redis
    restart: unless-stopped
    # Present for parity with the full stack. No Phase 1 consumer; Medusa + the
    # Inngest worker use it from Phase 2.
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Brand/domain routing (somnium.ro ↔ betterlife.ro/somnium). Optional in dev:
  #   docker compose --profile proxy up caddy
  caddy:
    image: caddy:2-alpine
    container_name: better-life-caddy
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
